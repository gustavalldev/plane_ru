x-plane-ru-source-dir: &plane-ru-source-dir ${PLANE_SOURCE_DIR:-/opt/disp/deploy/plane_ru}
x-plane-ru-node-build-args: &plane-ru-node-build-args
  DOCKER_BUILDKIT: 1
  VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
  VITE_API_BASE_PATH: ${VITE_API_BASE_PATH:-/api}
  VITE_ADMIN_BASE_URL: ${VITE_ADMIN_BASE_URL:-}
  VITE_ADMIN_BASE_PATH: ${VITE_ADMIN_BASE_PATH:-/god-mode}
  VITE_LIVE_BASE_URL: ${VITE_LIVE_BASE_URL:-}
  VITE_LIVE_BASE_PATH: ${VITE_LIVE_BASE_PATH:-/live}
  VITE_SPACE_BASE_URL: ${VITE_SPACE_BASE_URL:-}
  VITE_SPACE_BASE_PATH: ${VITE_SPACE_BASE_PATH:-/spaces}
  VITE_WEB_BASE_URL: ${VITE_WEB_BASE_URL:-}
  VITE_WEB_BASE_PATH: ${VITE_WEB_BASE_PATH:-}

x-plane-ru-backend-build: &plane-ru-backend-build
  context: ${PLANE_SOURCE_DIR:-/opt/disp/deploy/plane_ru}/apps/api
  dockerfile: Dockerfile.api
  args:
    DOCKER_BUILDKIT: 1

x-plane-ru-email-env: &plane-ru-email-env
  ENABLE_SIGNUP: ${ENABLE_SIGNUP:-0}
  ENABLE_SMTP: ${ENABLE_SMTP:-0}
  EMAIL_HOST: ${EMAIL_HOST:-}
  EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
  EMAIL_PORT: ${EMAIL_PORT:-587}
  EMAIL_FROM: ${EMAIL_FROM:-Team Plane <team@mailer.plane.so>}
  EMAIL_USE_TLS: ${EMAIL_USE_TLS:-1}
  EMAIL_USE_SSL: ${EMAIL_USE_SSL:-0}

services:
  plane-minio:
    image: minio/minio:${MINIO_IMAGE_TAG:-RELEASE.2025-09-07T16-13-09Z-cpuv1}

  transcription:
    image: plane-ru/plane-transcription:${PLANE_RU_IMAGE_TAG:-preview}
    build:
      context: ${PLANE_SOURCE_DIR:-/opt/disp/deploy/plane_ru}/deploy/plane_ru/transcription
      dockerfile: Dockerfile
    environment:
      TRANSCRIPTION_API_TOKEN: ${TRANSCRIPTION_API_TOKEN:?TRANSCRIPTION_API_TOKEN is required}
      TRANSCRIPTION_UPLOAD_SIZE_LIMIT: ${TRANSCRIPTION_UPLOAD_SIZE_LIMIT:-26214400}
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-small}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-ru}
      HF_HOME: /models/huggingface
    volumes:
      - transcription_cache:/models
    restart: unless-stopped

  web:
    image: plane-ru/plane-frontend:${PLANE_RU_IMAGE_TAG:-preview}
    build:
      context: *plane-ru-source-dir
      dockerfile: apps/web/Dockerfile.web
      args: *plane-ru-node-build-args

  space:
    image: plane-ru/plane-space:${PLANE_RU_IMAGE_TAG:-preview}
    build:
      context: *plane-ru-source-dir
      dockerfile: apps/space/Dockerfile.space
      args: *plane-ru-node-build-args

  api:
    image: plane-ru/plane-backend:${PLANE_RU_IMAGE_TAG:-preview}
    build: *plane-ru-backend-build
    environment:
      <<: *plane-ru-email-env
      TRANSCRIPTION_SERVICE_URL: ${TRANSCRIPTION_SERVICE_URL:-http://transcription:8000}
      TRANSCRIPTION_API_TOKEN: ${TRANSCRIPTION_API_TOKEN:?TRANSCRIPTION_API_TOKEN is required}
      TRANSCRIPTION_UPLOAD_SIZE_LIMIT: ${TRANSCRIPTION_UPLOAD_SIZE_LIMIT:-26214400}
    depends_on:
      - transcription

  worker:
    image: plane-ru/plane-backend:${PLANE_RU_IMAGE_TAG:-preview}
    build: *plane-ru-backend-build
    environment: *plane-ru-email-env

  beat-worker:
    image: plane-ru/plane-backend:${PLANE_RU_IMAGE_TAG:-preview}
    build: *plane-ru-backend-build
    environment: *plane-ru-email-env

  migrator:
    image: plane-ru/plane-backend:${PLANE_RU_IMAGE_TAG:-preview}
    build: *plane-ru-backend-build
    environment: *plane-ru-email-env

volumes:
  transcription_cache:
